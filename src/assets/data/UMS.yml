paths:
  /academic-semesters/create-academic-semester:
    post:
      tags:
        - Academic Semester
      summary: Create Academic Semester
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                title: Fall
                year: 2022
                code: '03'
                startMonth: January
                endMonth: May
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /academic-semesters/:
    get:
      tags:
        - Academic Semester
      summary: Filter
      parameters:
        - name: title
          in: query
          schema:
            type: string
          example: Autumn
        - name: code
          in: query
          schema:
            type: integer
          example: '01'
        - name: year
          in: query
          schema:
            type: integer
          example: '2023'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
